<!DOCTYPE html>
<html>
<head>
  <title>Women's Health AI Screening</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family:'Segoe UI'; background:#f4f6fb; margin:0; overflow-x:hidden; }
header { background:#6b46c1; color:white; padding:15px; text-align:center; font-weight:bold; }

.container { max-width:420px; margin:auto; padding:20px; }

.card {
  background:white; padding:20px; border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

input, textarea {
  width:100%; padding:12px; margin-top:10px;
  border-radius:8px; border:1px solid #ccc;
}

button {
  width:100%; padding:14px; margin-top:12px;
  border:none; border-radius:10px;
}

.primary { background:#6b46c1; color:white; }
.secondary { background:#ec4899; color:white; }

.yes { background:#22c55e; color:white; }
.no { background:#ef4444; color:white; }

.small { font-size:12px; color:gray; text-align:center; }
.tamil { font-size:13px; color:rgba(0,0,0,0.5); }

.badge { padding:8px 15px; border-radius:20px; color:white; }
.low { background:#22c55e; }
.mid { background:#f59e0b; }
.high { background:#ef4444; }

/* Floating ♀ */
.symbol {
  position:fixed;
  bottom:-50px;
  color:rgba(236,72,153,0.2);
  font-size:24px;
  animation:floatUp 10s linear infinite;
}
@keyframes floatUp {
  from { transform:translateY(0); }
  to { transform:translateY(-110vh); }
}
</style>
</head>

<body>

<header>Women's Health Screening Tool</header>

<!-- Floating symbols -->
<script>
for(let i=0;i<6;i++){
 let s=document.createElement("div");
 s.className="symbol";
 s.innerHTML="♀️";
 s.style.left=Math.random()*100+"vw";
 s.style.animationDuration=(6+Math.random()*6)+"s";
 document.body.appendChild(s);
}
</script>

<div class="container">

<div class="card" id="home">

<h3>Your Details</h3>

<input id="age" placeholder="Age">
<input id="height" placeholder="Height (cm)">
<input id="weight" placeholder="Weight (kg)">

<button class="primary" onclick="start('pcos')">PCOS Screening</button>
<button class="secondary" onclick="start('breast')">Breast Screening</button>

<div class="small">
No login | Data not stored <br>
⚠ Awareness only
</div>

</div>

<div class="card" id="quiz" style="display:none;"></div>

</div>

<script>

let type="", step=0, answers=[];

let pcodQ = [
["Are your periods irregular?","மாதவிடாய் முறையற்றதா?"],
["Skipped periods >2 months?","2 மாதம் தவறியதா?"],
["Acne present?","முகப்பரு உள்ளதா?"],
["Facial hair growth?","முகத்தில் முடி உள்ளதா?"],
["Weight gain?","எடை அதிகமா?"]
];

let breastQ = [
["Lump in breast?","மார்பகத்தில் கட்டி உள்ளதா?"],
["Shape change?","வடிவம் மாறியதா?"],
["Skin dimpling?","தோல் குழிவா?"],
["Discharge?","சுரப்பு உள்ளதா?"],
["Pain?","வலி உள்ளதா?"]
];

function start(t){
  type=t;
  let age=ageInput();

  if((t=="breast" && age<20) || (t=="pcos" && age<14)){
    alert("⚠ Age not typical. Consult doctor.");
  }

  step=0;
  answers=[];
  home.style.display="none";
  quiz.style.display="block";
  showQ();
}

function showQ(){
 let q = (type=="pcos") ? pcodQ : breastQ;

 if(step < q.length){
   quiz.innerHTML=`
   <h3>${q[step][0]}</h3>
   <div class="tamil">${q[step][1]}</div>
   <button class="yes" onclick="ans(1)">Yes</button>
   <button class="no" onclick="ans(0)">No</button>
   `;
 } else {
   extraInput();
 }
}

function ans(v){
 answers.push(v);
 step++;
 showQ();
}

function extraInput(){
 quiz.innerHTML=`
 <h3>Describe your symptoms</h3>
 <textarea id="text"></textarea>
 <button class="primary" onclick="analyze()">Analyze</button>
 `;
}

function ageInput(){ return parseInt(age.value||0); }

function getBMI(){
 let h=height.value/100;
 let w=weight.value;
 return (w/(h*h)).toFixed(1);
}

function analyze(){

 let age=ageInput();
 let bmi=getBMI();
 let text=document.getElementById("text").value.toLowerCase();

 let risk="Low", msg="";

 // PCOS LOGIC
 if(type=="pcos"){
   if(answers[0] && (answers[2]||answers[3]) && bmi>25){
     risk="High";
     msg="Hormonal imbalance and PCOS risk detected.";
   }
   else if(answers[0] && answers[4]){
     risk="Moderate";
     msg="Possible PCOS symptoms.";
   }
 }

 // BREAST LOGIC
 if(type=="breast"){
   if(answers[0] || text.includes("lump") || text.includes("discharge")){
     risk="High";
     msg="Suspicious breast symptoms.";
   }
 }

 // Keyword detection
 if(text.includes("pain")) msg += " Pain reported.";
 if(text.includes("bleeding")) risk="High";

 showResult(risk, msg, bmi);
}

function showResult(risk,msg,bmi){

 let cls = risk=="Low"?"low":risk=="Moderate"?"mid":"high";

 quiz.innerHTML=`
 <h2>${risk} Risk</h2>
 <div class="badge ${cls}">${risk}</div>

 <p><b>Analysis:</b> ${msg}</p>

 <p><b>BMI:</b> ${bmi}</p>

 <p>
 Based on your inputs, this is a screening result only.
 Please consult a doctor for confirmation.
 </p>

 <button onclick="location.reload()">Restart</button>
 `;
}

</script>

</body>
</html>
